name: gopal_app
description: Gopal App with Login and Register functionality.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_blue_plus: ^1.35.5
  fl_chart: ^1.2.0
  flutter_riverpod: ^2.6.1
  flutter_dotenv:
  shared_preferences: ^2.5.5
  google_fonts: ^8.0.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/models/
